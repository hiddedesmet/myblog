<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#11151f"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="25%" cy="20%" r="70%">
      <stop offset="0%" stop-color="rgba(46, 92, 255, 0.55)"/>
      <stop offset="100%" stop-color="rgba(125, 77, 255, 0)"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2e5cff"/>
      <stop offset="100%" stop-color="#7d4dff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <text x="80" y="280" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="800" letter-spacing="-2" fill="#fff">Hidde de Smet</text>
  <text x="80" y="350" font-family="Source Serif 4, Georgia, serif" font-size="36" font-weight="400" font-style="italic" fill="rgba(255,255,255,0.75)">Stories, journeys, and ideas for the creatively curious</text>
  <rect x="80" y="430" width="120" height="6" rx="3" fill="url(#accent)"/>
</svg>
